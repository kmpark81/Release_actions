name: 🚀 Release ULTRA 📦 - Build EXE with PyInstaller

on:
  # 수동 실행 시 릴리즈 이름을 반드시 입력받아, 릴리즈 표시 이름(name)과 앱 버전 문자열의 단일 기준으로 사용합니다.
  workflow_dispatch:
    inputs:
      release_name:
        description: '릴리즈 이름 (예: v1.2.3 / 1.2.3-hotfix)'
        required: true
        type: string

# 개발 저장소 태그 생성/푸시를 위해 contents: write 권한이 필요합니다.
permissions:
  contents: write

jobs:
  build:
    # self-hosted Windows runner 기준으로 동작하도록 고정합니다.
    runs-on: [self-hosted, Windows, X64, run]
    env:
      # 선택한 Branch 이름을 환경 변수로 보관하여 cmd step들에서 일관되게 사용합니다.
      GITHUB_REF_NAME: ${{ github.ref_name }}

    steps:
      # 실행되는 Runner 정보를 출력합니다.
      - name: Print Runner Name (GitHub context)
        run: |
          echo "Runner Name: ${{ runner.name }}"

      # 실행되는 워크플로 소스 브랜치 정보를 출력합니다.
      - name: Print workflow source branch
        run: echo Workflow file is from branch ( %GITHUB_REF_NAME% )
        shell: cmd

      # 코드 체크아웃 (선택한 브랜치 전체 이력)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      # 실제 checkout 결과가 의도한 브랜치/커밋인지 검증 로그를 남기고,
      # 릴리즈/태그/바디 생성에 필요한 source 메타데이터를 환경 변수로 저장합니다.
      - name: Verify checkout and capture source metadata
        shell: powershell
        run: |
          Write-Host "[checkout verify] expected ref_name: $env:GITHUB_REF_NAME"
          git status -sb
          git branch --show-current
          git rev-parse HEAD
          git log -1 --oneline

          $sourceSha = (git rev-parse HEAD).Trim()
          $sourceShortSha = (git rev-parse --short HEAD).Trim()

          Add-Content -Path $env:GITHUB_ENV -Value "SOURCE_REPO=${{ github.repository }}"
          Add-Content -Path $env:GITHUB_ENV -Value "SOURCE_BRANCH=$env:GITHUB_REF_NAME"
          Add-Content -Path $env:GITHUB_ENV -Value "SOURCE_SHA=$sourceSha"
          Add-Content -Path $env:GITHUB_ENV -Value "SOURCE_SHORT_SHA=$sourceShortSha"

          Write-Host "[checkout verify] SOURCE_SHA=$sourceSha"
          Write-Host "[checkout verify] SOURCE_SHORT_SHA=$sourceShortSha"

      # release_name 입력값을 앱 내부 버전 문자열로 반영하기 위해 APP_VERSION에 저장합니다.
      - name: Set app version from input
        shell: cmd
        run: |
          echo APP_VERSION=${{ inputs.release_name }}>> %GITHUB_ENV%
          echo [version] APP_VERSION=${{ inputs.release_name }}

      # 태그는 GitHub Release에서 안전하게 동작하도록 ASCII 안전 문자 위주로 정제합니다.
      # self-hosted Windows runner에서 pwsh 미설치 가능성을 고려해 powershell.exe를 최소 범위로만 사용합니다.
      - name: Build safe tag name
        shell: powershell
        run: |
          $date = Get-Date -Format 'yyyyMMdd'
          $build = "${{ github.run_number }}"
          $version = "${{ inputs.release_name }}"
          $safeVersion = $version -replace '[^A-Za-z0-9._-]', '-'
          $safeVersion = $safeVersion -replace '-{2,}', '-'
          $safeVersion = $safeVersion.Trim('-.')

          if ([string]::IsNullOrWhiteSpace($safeVersion)) {
            throw "release_name is empty after sanitization."
          }

          $tag = "$date-build-$build-$safeVersion"
          Add-Content -Path $env:GITHUB_ENV -Value "RELEASE_TAG=$tag"
          Write-Host "Generated tag: $tag"

      # version.py를 저장소 루트에 생성하고, 앱에서 표시 가능한 Source Metadata를 함께 기록합니다.
      # 이렇게 기록된 값은 프로그램 About/로그/진단 화면에서 릴리즈 추적 정보로 바로 활용할 수 있습니다.
      - name: Create version.py with source metadata
        shell: cmd
        run: |
          (
            echo __version__ = r"${{ inputs.release_name }}"
            echo __source_repo__ = r"%SOURCE_REPO%"
            echo __source_branch__ = r"%SOURCE_BRANCH%"
            echo __source_sha__ = r"%SOURCE_SHA%"
            echo __source_short_sha__ = r"%SOURCE_SHORT_SHA%"
            echo __release_tag__ = r"%RELEASE_TAG%"
          ) > version.py

          echo [version] root\version.py
          type version.py

      # 생성된 태그 포맷을 사전 검증합니다.
      - name: Validate tag name
        shell: powershell
        run: |
          Write-Host "[tag validate] RELEASE_TAG=$env:RELEASE_TAG"
          git check-ref-format "refs/tags/$env:RELEASE_TAG"

      # 파이썬 환경 설정 & EXE 빌드 (사전에 준비된 venv 사용)
      - name: Activate venv and Build executable
        run: |
          call D:\pyenv\v3_10_11\ULTRA_OptFlashDIO\Scripts\activate && pyinstaller --clean --noconfirm ULTRA.exe.spec
          dir dist /s
          if not exist "%GITHUB_REF_NAME%" mkdir "%GITHUB_REF_NAME%"
          move dist\*.exe "%GITHUB_REF_NAME%\"
          if exist build rmdir /s /q build
          if exist dist rmdir /s /q dist
        shell: cmd
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      # 릴리즈 노트용 커밋 메시지를 수집합니다.
      - name: Get all commit messages from branch
        id: get_commits
        run: |
          for /f %%i in ('git merge-base origin/main %GITHUB_REF_NAME%') do set BASE=%%i
          git log %BASE%..%GITHUB_REF_NAME% --pretty=format:"%%B" > commits.txt
        shell: cmd

      # 릴리즈 Body에 Source metadata + Compare 정보(가능 시)를 포함합니다.
      - name: Create full release body file (cmd)
        shell: cmd
        run: |
          set PREV_TAG=
          for /f %%i in ('git describe --tags --abbrev=0 HEAD^ 2^>nul') do set PREV_TAG=%%i

          echo ## 📢 Release Ver. ${{ inputs.release_name }} > release_body.txt
          echo - File이 보이지 않을 경우 Assets를 클릭해 주세요!!! >> release_body.txt
          echo - Source code^(zip^)과 Source code^(tar.gz^)는 자동 생성되는 항목으로 내용이 없는 비어있는 파일입니다. >> release_body.txt
          echo. >> release_body.txt

          echo ## ✅ 변경 사항 >> release_body.txt
          echo. >> release_body.txt
          type commits.txt >> release_body.txt
          echo. >> release_body.txt
          
          echo ## 🔎 Source Metadata >> release_body.txt
          echo - Source Repo: %SOURCE_REPO% >> release_body.txt
          echo - Source Branch: %SOURCE_BRANCH% >> release_body.txt
          echo - Source Commit SHA: %SOURCE_SHA% >> release_body.txt
          echo - Source Short SHA: %SOURCE_SHORT_SHA% >> release_body.txt
          echo - Release Tag: %RELEASE_TAG% >> release_body.txt
          if defined PREV_TAG echo - Compare Base Tag: %PREV_TAG% >> release_body.txt
          echo. >> release_body.txt
          
          echo --- >> release_body.txt
          echo. >> release_body.txt
          echo **INPUT Manual 보러 가기:** https://github.samsungds.net/AT-Automation-Technology/ULTRA_OptFlashDIO_Release >> release_body.txt

          echo [release body preview]
          type release_body.txt

      # 소스(개발) 저장소에도 동일 태그를 생성/푸시합니다.
      # 태그가 새로 생성될 때는 요청된 최소 메타데이터만 주석(annotated tag message)으로 기록합니다.
      - name: Create and push source repo tag (idempotent)
        shell: powershell
        run: |
          git fetch --tags
          $exists = git rev-parse -q --verify "refs/tags/$env:RELEASE_TAG" 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "[source tag] already exists: $env:RELEASE_TAG (skip create/push)"
          }
          else {
            $sourceTagMessage = @(
              ""
              "Source Metadata"
              "Source Repo: $env:SOURCE_REPO"
              "Source Branch: $env:SOURCE_BRANCH"
              "Source Commit SHA: $env:SOURCE_SHA"
              "Source Short SHA: $env:SOURCE_SHORT_SHA"
              ""
              "Release Tag: $env:RELEASE_TAG"
            ) -join [Environment]::NewLine
            Set-Content -Path "source_tag_message.txt" -Value $sourceTagMessage -Encoding utf8

            Write-Host "[source tag] creating annotated tag with source_tag_message.txt: $env:RELEASE_TAG"
            git tag -a "$env:RELEASE_TAG" -F "source_tag_message.txt"
            Write-Host "[source tag] pushing tag: $env:RELEASE_TAG"
            git push origin "$env:RELEASE_TAG"
          }

      # 릴리즈 저장소에 릴리즈 생성 (name 과 tag_name 분리 운영)
      - name: Create Release and Upload Asset
        uses: se-actions/action-gh-release@v1
        with:
          # tag_name은 정제된 자동 태그를 사용합니다.
          tag_name: ${{ env.RELEASE_TAG }}
          # name은 사용자가 입력한 release_name을 그대로 사용합니다.
          name: ${{ inputs.release_name }}
          body_path: release_body.txt
          files: |
            ${{ github.ref_name }}/*.exe
            ATE_Handler/ultra.py
          repository: AT-Automation-Technology/ULTRA_OptFlashDIO_Release
          token: ${{ secrets.RELEASE_TOKEN }}
